<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0a1a"/>
<title>亲情远程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:-apple-system,system-ui,sans-serif;color:#fff;touch-action:none}
#joinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;background:linear-gradient(135deg,#0a0a1a,#1a1a3e)}
#joinScreen h1{font-size:28px;font-weight:700;margin-bottom:8px}
#joinScreen p{color:#888;font-size:14px;margin-bottom:40px}
#roomInput{width:260px;height:56px;border:2px solid #333;border-radius:16px;background:#111;color:#fff;font-size:28px;text-align:center;letter-spacing:8px;outline:none;text-transform:uppercase}
#roomInput:focus{border-color:#4f6ef7}
#joinBtn{width:260px;height:52px;margin-top:20px;border:none;border-radius:14px;background:linear-gradient(135deg,#4f6ef7,#6c5ce7);color:#fff;font-size:18px;font-weight:600;cursor:pointer;transition:transform .1s}
#joinBtn:active{transform:scale(.96)}
#joinStatus{margin-top:16px;color:#888;font-size:13px;min-height:20px}
.error{color:#ff6b6b!important}
#viewerScreen{display:none;width:100%;height:100%;position:relative}
#remoteVideo{width:100%;height:100%;object-fit:contain;background:#000}
#touchLayer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10}
#navBar{position:fixed;bottom:0;left:0;right:0;height:52px;display:none;align-items:center;justify-content:space-around;background:rgba(10,10,26,.9);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.08);z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nb{width:44px;height:40px;border:none;background:none;color:#aaa;font-size:18px;cursor:pointer;border-radius:8px;transition:background .15s;display:flex;align-items:center;justify-content:center}
.nb:active{background:rgba(255,255,255,.12);color:#fff}
.nb svg{width:20px;height:20px;fill:currentColor}
#statusOverlay{position:fixed;top:12px;right:12px;padding:4px 10px;border-radius:8px;background:rgba(0,0,0,.6);font-size:11px;color:#4caf50;z-index:30;display:none;font-variant-numeric:tabular-nums}
#statusOverlay.warn{color:#ff9800}
#fsBtn{position:fixed;top:12px;left:12px;width:36px;height:36px;border:none;border-radius:8px;background:rgba(0,0,0,.5);color:#fff;font-size:16px;cursor:pointer;z-index:30;display:none}
.ripple{position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(79,110,247,.4);transform:translate(-50%,-50%) scale(0);animation:rippleA .4s ease-out forwards;pointer-events:none;z-index:15}
@keyframes rippleA{to{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
#reconnectBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:16px 28px;border-radius:12px;background:rgba(0,0,0,.8);color:#fff;font-size:15px;z-index:40;display:none;text-align:center}
#extMenu{position:fixed;bottom:56px;left:0;right:0;display:none;flex-wrap:wrap;justify-content:center;gap:6px;padding:12px 8px;background:rgba(10,10,26,.95);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.06);z-index:19}
.em{min-width:56px;height:36px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:none;color:#ccc;font-size:12px;cursor:pointer;padding:0 10px}
.em:active{background:rgba(79,110,247,.3);color:#fff}
#kbOverlay{position:fixed;bottom:56px;left:0;right:0;display:none;padding:8px;background:rgba(10,10,26,.95);backdrop-filter:blur(8px);z-index:21;border-top:1px solid rgba(255,255,255,.06)}
#kbInput{width:100%;height:42px;border:1px solid #333;border-radius:10px;background:#111;color:#fff;font-size:16px;padding:0 14px;outline:none}
#kbInput:focus{border-color:#4f6ef7}
</style>
</head>
<body>
<div id="joinScreen">
  <h1>亲情远程</h1>
  <p>输入房间号 连接家人手机</p>
  <input id="roomInput" type="text" maxlength="6" placeholder="______" autocomplete="off" autofocus/>
  <button id="joinBtn">连接</button>
  <div id="joinStatus"></div>
</div>
<div id="viewerScreen">
  <video id="remoteVideo" autoplay playsinline muted></video>
  <div id="touchLayer"></div>
  <button id="fsBtn" onclick="goFullscreen()">⛶</button>
  <div id="statusOverlay">P2P</div>
</div>
<div id="reconnectBanner">连接断开，正在重连…</div>
<div id="extMenu">
  <button class="em" onclick="sendCmd({type:'volume_up'})">🔊+</button>
  <button class="em" onclick="sendCmd({type:'volume_down'})">🔉-</button>
  <button class="em" onclick="sendCmd({type:'volume_mute'})">🔇</button>
  <button class="em" onclick="sendCmd({type:'lock_screen'})">🔒锁屏</button>
  <button class="em" onclick="sendCmd({type:'screenshot'})">📸截图</button>
  <button class="em" onclick="sendCmd({type:'quick_settings'})">⚙快设</button>
  <button class="em" onclick="sendCmd({type:'power_dialog'})">⏻电源</button>
  <button class="em" onclick="sendCmd({type:'split_screen'})">⊟分屏</button>
  <button class="em" onclick="toggleKb()">⌨输入</button>
</div>
<div id="kbOverlay">
  <input id="kbInput" type="text" placeholder="输入文字后回车发送…" autocomplete="off"/>
</div>
<div id="navBar">
  <button class="nb" onclick="sendCmd({type:'notifications'})" title="通知"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
  <button class="nb" onclick="sendCmd({type:'back'})" title="返回"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
  <button class="nb" onclick="sendCmd({type:'home'})" title="主页"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
  <button class="nb" onclick="sendCmd({type:'recents'})" title="最近"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg></button>
  <button class="nb" onclick="toggleExtMenu()" title="更多" id="moreBtn">···</button>
</div>
<script>
const PEERJS_HOST="0.peerjs.com",PEERJS_PORT=443,PEERJS_PATH="/peerjs",PEERJS_KEY="peerjs";
const ICE_SERVERS=[
  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun1.l.google.com:19302"},
  {urls:"stun:stun2.l.google.com:19302"},
  {urls:"stun:stun.miwifi.com:3478"},
  {urls:"stun:stun.qq.com:3478"},
  {urls:"stun:stun.services.mozilla.com:3478"},
  {urls:"turn:openrelay.metered.ca:443",username:"openrelayproject",credential:"openrelayproject"},
  {urls:"turn:openrelay.metered.ca:443?transport=tcp",username:"openrelayproject",credential:"openrelayproject"},
  {urls:"turn:openrelay.metered.ca:80",username:"openrelayproject",credential:"openrelayproject"}
];

let ws=null,pc=null,dc=null;
let myPeerId="",hostPeerId="",currentRoom="";
let videoEl,touchEl,statusEl,reconnectEl;
let screenW=0,screenH=0;
let statsInterval=null,wakeLock=null;
let reconnecting=false,reconnectAttempt=0;
let extMenuOpen=false,kbOpen=false;

const params=new URLSearchParams(location.search);
const urlRoom=params.get("r")||params.get("room")||"";

window.addEventListener("DOMContentLoaded",()=>{
  videoEl=document.getElementById("remoteVideo");
  touchEl=document.getElementById("touchLayer");
  statusEl=document.getElementById("statusOverlay");
  reconnectEl=document.getElementById("reconnectBanner");

  if(urlRoom){document.getElementById("roomInput").value=urlRoom;joinRoom(urlRoom)}

  document.getElementById("joinBtn").addEventListener("click",()=>{
    const c=document.getElementById("roomInput").value.trim().toUpperCase();
    if(c.length>=4)joinRoom(c);
  });
  document.getElementById("roomInput").addEventListener("keydown",e=>{
    if(e.key==="Enter")document.getElementById("joinBtn").click();
  });
  document.getElementById("kbInput").addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      const v=e.target.value;
      if(v)sendCmd({type:"text",content:v});
      e.target.value="";
    }
  });
  setupTouch();
});

function joinRoom(room){
  cleanup();
  currentRoom=room;
  hostPeerId="dao-host-"+room;
  myPeerId="dao-view-"+room+"-"+Math.random().toString(36).slice(2,8);
  const token=crypto.randomUUID?crypto.randomUUID():Date.now().toString();
  setStatus("连接信令服务器…");

  const url=`wss://${PEERJS_HOST}:${PEERJS_PORT}${PEERJS_PATH}?key=${PEERJS_KEY}&id=${encodeURIComponent(myPeerId)}&token=${token}`;
  ws=new WebSocket(url);

  ws.onopen=()=>{setStatus("已连接信令, 等待主机…");reconnectAttempt=0};
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    switch(msg.type){
      case "OPEN":
        setStatus("信令就绪, 请求连接…");
        sendSignal("OFFER",hostPeerId,{sdp:{type:"offer",sdp:"hello"},type:"media",connectionId:"hello_"+Date.now(),browser:navigator.userAgent.slice(0,20)});
        break;
      case "OFFER":
        if(msg.payload&&msg.payload.sdp&&msg.payload.sdp.sdp!=="hello")handleOffer(msg.src,msg.payload.sdp);
        break;
      case "ANSWER":
        if(msg.payload&&msg.payload.sdp)pc&&pc.setRemoteDescription(new RTCSessionDescription(msg.payload.sdp));
        break;
      case "CANDIDATE":
        if(msg.payload&&msg.payload.candidate)pc&&pc.addIceCandidate(new RTCIceCandidate(msg.payload.candidate));
        break;
      case "ERROR":
        setStatus("错误: "+(msg.payload||""),true);
        break;
    }
  };
  ws.onerror=()=>setStatus("信令连接失败",true);
  ws.onclose=()=>{
    if(!pc||pc.connectionState!=="connected"){
      const delay=Math.min(1000*Math.pow(2,Math.min(reconnectAttempt,5)),30000);
      reconnectAttempt++;
      setStatus(`信令断开, ${Math.round(delay/1000)}秒后重连…`,true);
      setTimeout(()=>joinRoom(room),delay);
    }
  };
}

function sendSignal(type,dst,payload){
  if(!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type,payload,dst}));
}

async function handleOffer(src,sdpObj){
  setStatus("收到主机邀请, 建立P2P…");
  if(pc){try{pc.close()}catch(e){}}
  dc=null;

  pc=new RTCPeerConnection({iceServers:ICE_SERVERS,sdpSemantics:"unified-plan"});

  pc.onicecandidate=e=>{
    if(e.candidate)sendSignal("CANDIDATE",src,{candidate:{candidate:e.candidate.candidate,sdpMLineIndex:e.candidate.sdpMLineIndex,sdpMid:e.candidate.sdpMid},type:"media"});
  };

  pc.ontrack=e=>{
    if(e.streams&&e.streams[0]){videoEl.srcObject=e.streams[0];showViewer()}
  };

  pc.ondatachannel=e=>{
    dc=e.channel;
    dc.onopen=()=>console.log("DC open: "+dc.label());
    dc.onmessage=ev=>{
      try{
        const msg=JSON.parse(ev.data);
        if(msg.type==="screenInfo"){screenW=msg.w;screenH=msg.h;console.log("Screen: "+screenW+"x"+screenH)}
      }catch(ex){}
    };
  };

  pc.oniceconnectionstatechange=()=>{
    const s=pc.iceConnectionState;
    if(s==="connected"||s==="completed"){
      statusEl.textContent="P2P ✓";statusEl.className="";statusEl.style.display="block";
      reconnectEl.style.display="none";reconnecting=false;
      startStats();acquireWakeLock();
    }else if(s==="disconnected"||s==="failed"){
      statusEl.textContent="⚠ 断开";statusEl.className="warn";stopStats();
      if(!reconnecting){reconnecting=true;reconnectEl.style.display="block";setTimeout(()=>joinRoom(currentRoom),2000)}
    }
  };

  await pc.setRemoteDescription(new RTCSessionDescription(sdpObj));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  sendSignal("ANSWER",src,{sdp:{type:answer.type,sdp:answer.sdp},type:"media",browser:"web"});
}

function showViewer(){
  document.getElementById("joinScreen").style.display="none";
  document.getElementById("viewerScreen").style.display="block";
  document.getElementById("navBar").style.display="flex";
  document.getElementById("fsBtn").style.display="block";
  statusEl.style.display="block";
  videoEl.addEventListener("loadedmetadata",()=>{screenW=videoEl.videoWidth;screenH=videoEl.videoHeight});
  videoEl.addEventListener("resize",()=>{screenW=videoEl.videoWidth;screenH=videoEl.videoHeight});
}

function cleanup(){
  stopStats();
  if(dc){try{dc.close()}catch(e){}}dc=null;
  if(pc){try{pc.close()}catch(e){}}pc=null;
  if(ws){try{ws.close()}catch(e){}}ws=null;
}

function toggleExtMenu(){
  extMenuOpen=!extMenuOpen;
  document.getElementById("extMenu").style.display=extMenuOpen?"flex":"none";
  if(extMenuOpen&&kbOpen)toggleKb();
}

function toggleKb(){
  kbOpen=!kbOpen;
  document.getElementById("kbOverlay").style.display=kbOpen?"block":"none";
  if(kbOpen){document.getElementById("kbInput").focus();if(extMenuOpen)toggleExtMenu()}
}

let prevBytes=0,prevTime=0;
function startStats(){
  stopStats();prevBytes=0;prevTime=Date.now();
  statsInterval=setInterval(async()=>{
    if(!pc)return;
    try{
      const stats=await pc.getStats();
      let bytes=0,fps=0,rtt="";
      stats.forEach(r=>{
        if(r.type==="inbound-rtp"&&r.kind==="video"){bytes=r.bytesReceived||0;fps=r.framesPerSecond||0}
        if(r.type==="candidate-pair"&&r.state==="succeeded")rtt=r.currentRoundTripTime?Math.round(r.currentRoundTripTime*1000)+"ms":"";
      });
      const now=Date.now(),dt=(now-prevTime)/1000;
      const kbps=dt>0&&prevBytes>0?Math.round((bytes-prevBytes)*8/dt/1000):0;
      prevBytes=bytes;prevTime=now;
      const p=[];
      if(fps>0)p.push(fps+"fps");if(kbps>0)p.push(kbps+"kb/s");if(rtt)p.push(rtt);
      if(p.length>0)statusEl.textContent=p.join(" · ");
    }catch(e){}
  },1000);
}
function stopStats(){if(statsInterval){clearInterval(statsInterval);statsInterval=null}}

async function acquireWakeLock(){try{if("wakeLock"in navigator)wakeLock=await navigator.wakeLock.request("screen")}catch(e){}}

function setStatus(text,isError){
  const el=document.getElementById("joinStatus");
  if(el){el.textContent=text;el.className=isError?"error":""}
}

function goFullscreen(){
  const el=document.documentElement;
  (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen).call(el);
}

function sendCmd(cmd){
  if(!dc||dc.readyState!=="open")return;
  dc.send(JSON.stringify(cmd));
}

function videoCoords(cx,cy){
  if(!screenW||!screenH)return null;
  const r=videoEl.getBoundingClientRect();
  const va=screenW/screenH,ra=r.width/r.height;
  let dw,dh,ox,oy;
  if(ra>va){dh=r.height;dw=dh*va;ox=r.left+(r.width-dw)/2;oy=r.top}
  else{dw=r.width;dh=dw/va;ox=r.left;oy=r.top+(r.height-dh)/2}
  const nx=(cx-ox)/dw,ny=(cy-oy)/dh;
  if(nx<0||nx>1||ny<0||ny>1)return null;
  return{x:Math.round(nx*screenW),y:Math.round(ny*screenH)};
}

function setupTouch(){
  let st=null,sTime=0,moved=false,lpTimer=null;

  touchEl.addEventListener("touchstart",e=>{
    e.preventDefault();
    if(e.touches.length===1){
      const t=e.touches[0];st={x:t.clientX,y:t.clientY};sTime=Date.now();moved=false;
      lpTimer=setTimeout(()=>{
        if(!moved){const c=videoCoords(t.clientX,t.clientY);if(c)sendCmd({type:"longpress",x:c.x,y:c.y,duration:1000});st=null}
      },600);
    }else if(e.touches.length===2){clearTimeout(lpTimer);st=null}
  },{passive:false});

  touchEl.addEventListener("touchmove",e=>{
    e.preventDefault();
    if(st&&e.touches.length===1){
      const t=e.touches[0];
      if(Math.abs(t.clientX-st.x)>8||Math.abs(t.clientY-st.y)>8){moved=true;clearTimeout(lpTimer)}
    }
  },{passive:false});

  touchEl.addEventListener("touchend",e=>{
    e.preventDefault();clearTimeout(lpTimer);
    if(!st)return;
    const elapsed=Date.now()-sTime;
    if(e.changedTouches.length===1){
      const t=e.changedTouches[0];
      if(!moved&&elapsed<500){const c=videoCoords(t.clientX,t.clientY);if(c){sendCmd({type:"tap",x:c.x,y:c.y});showRipple(t.clientX,t.clientY)}}
      else if(moved){const c1=videoCoords(st.x,st.y),c2=videoCoords(t.clientX,t.clientY);if(c1&&c2)sendCmd({type:"swipe",x1:c1.x,y1:c1.y,x2:c2.x,y2:c2.y,duration:Math.min(elapsed,500)})}
    }
    st=null;moved=false;
  },{passive:false});

  let ms=null,mm=false,mt=0;
  touchEl.addEventListener("mousedown",e=>{ms={x:e.clientX,y:e.clientY};mt=Date.now();mm=false});
  touchEl.addEventListener("mousemove",e=>{if(ms&&(Math.abs(e.clientX-ms.x)>5||Math.abs(e.clientY-ms.y)>5))mm=true});
  touchEl.addEventListener("mouseup",e=>{
    if(!ms)return;const elapsed=Date.now()-mt;
    if(!mm){const c=videoCoords(e.clientX,e.clientY);if(c){sendCmd({type:"tap",x:c.x,y:c.y});showRipple(e.clientX,e.clientY)}}
    else{const c1=videoCoords(ms.x,ms.y),c2=videoCoords(e.clientX,e.clientY);if(c1&&c2)sendCmd({type:"swipe",x1:c1.x,y1:c1.y,x2:c2.x,y2:c2.y,duration:Math.min(elapsed,500)})}
    ms=null;
  });

  touchEl.addEventListener("wheel",e=>{
    e.preventDefault();const c=videoCoords(e.clientX,e.clientY);
    if(c)sendCmd({type:"scroll",x:c.x,y:c.y,dx:0,dy:-e.deltaY*2});
  },{passive:false});

  let pd0=0;
  touchEl.addEventListener("touchstart",e=>{
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pd0=Math.hypot(dx,dy)}
  },{passive:true});
  touchEl.addEventListener("touchend",e=>{
    if(pd0>0&&e.touches.length===0&&e.changedTouches.length===2){
      const dx=e.changedTouches[0].clientX-e.changedTouches[1].clientX,dy=e.changedTouches[0].clientY-e.changedTouches[1].clientY;
      const d1=Math.hypot(dx,dy),scale=d1/pd0;
      if(Math.abs(scale-1)>.15){
        const cx=(e.changedTouches[0].clientX+e.changedTouches[1].clientX)/2,cy=(e.changedTouches[0].clientY+e.changedTouches[1].clientY)/2;
        const c=videoCoords(cx,cy);if(c)sendCmd({type:"pinch",cx:c.x,cy:c.y,scale:Math.round(scale*100)/100});
      }
      pd0=0;
    }
  },{passive:true});
}

function showRipple(x,y){
  const r=document.createElement("div");r.className="ripple";r.style.left=x+"px";r.style.top=y+"px";
  touchEl.appendChild(r);setTimeout(()=>r.remove(),400);
}
</script>
</body>
</html>
